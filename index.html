    getBeing(key) {
      return this.state.beings[key];
    }

    getCurrentBeing() {
      return this.getBeing(this.state.currentContext);
    }

    getCurrentThread() {
      return this.threads[this.state.currentContext][this.state.currentSpeaker];
    }

    setCurrentContext(key) {
      if (this.state.beings[key]) this.state.currentContext = key;
    }

    setSpeaker(name) {
      this.state.currentSpeaker = name;
    }

    normalizeText(text) {
      return text
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    hasAny(text, words) {
      return words.some(word => text.includes(word));
    }

    isFollowUp(text) {
      return this.hasAny(text, [
        "a que te refieres", "que quieres decir", "explicame", "explica",
        "desarrolla", "como asi", "como que", "algo mas", "y eso",
        "por que", "porque", "como lo noto", "como se nota", "mas detalles",
        "y ayer", "ayer me dijiste", "antes dijiste", "eso de ayer"
      ]);
    }

    detectIntent(text) {
      if (this.isFollowUp(text)) return "followup";
      if (this.hasAny(text, ["como estas", "que tal", "como vas"])) return "status";
      if (this.hasAny(text, ["riego", "regar", "agua", "sed"])) return "water";
      if (this.hasAny(text, ["drenaje", "drenar", "encharc", "charco", "compacta", "compactado"])) return "drainage";
      if (this.hasAny(text, ["raiz", "raices"])) return "roots";
      if (this.hasAny(text, ["sol", "sombra", "luz"])) return "light";
      if (this.hasAny(text, ["viento", "alisio", "aire"])) return "wind";
      if (this.hasAny(text, ["poda", "podar", "cortar", "hojas", "chupones"])) return "pruning";
      if (this.hasAny(text, ["abono", "abonar", "potasio", "nitrogeno", "compost", "consuelda", "ceniza"])) return "fertilization";
      if (this.hasAny(text, ["flor", "floracion", "fruto", "frutos", "cuajado", "aguacates", "tomates"])) return "fruit";
      if (this.hasAny(text, ["plaga", "hongo", "phytophthora", "fitoftora", "enfermedad", "mildiu"])) return "disease";
      if (this.hasAny(text, ["necesitas", "que hago", "ayuda", "prioridad"])) return "needs";
      return "general";
    }

    getTopicKey(beingKey, speaker) {
      return `${beingKey}__${speaker}`;
    }

    setLastTopic(beingKey, speaker, topic) {
      this.lastTopicByBeingAndSpeaker[this.getTopicKey(beingKey, speaker)] = topic;
    }

    getLastTopic(beingKey, speaker) {
      return this.lastTopicByBeingAndSpeaker[this.getTopicKey(beingKey, speaker)] || null;
    }

    speakerFlavorPrefix(speaker, beingName) {
      if (speaker === 'Mario') return '';
      if (speaker === 'Yani') return 'Contigo voy un poco más al equilibrio general. ';
      return 'Si vienes de fuera, te lo digo de forma clara. ';
    }

    avocadoReply(intent, speaker) {
      const temp = this.state.weather.temp || 24;

        status: `${prefix}Ahora mismo voy sensible pero razonablemente estable. Con ${temp}°C y una humedad de ${humidity}%, mi punto crítico no es tanto el calor como que mis raíces respiren bien y no se queden en suelo pesado.`,

        drainage: `${prefix}Cuando hablo de drenaje libre, me refiero a que el exceso de agua pueda salir y que el suelo no se quede apelmazado alrededor de mis raíces. Si tras regar o llover la tierra sigue muy pesada, se forman charcos o el agua tarda demasiado en desaparecer, eso no me conviene.`,

        pruning: `${prefix}Con la poda conmigo hay que tener mano. Mejor limpieza y formación que recorte brusco. Si me desnudas demasiado, el sol y el estrés me pasan factura.`,

        drainage: `${prefix}Dicho más claro: si hoy me riegas o llueve, mañana la tierra puede seguir fresca, pero no debería seguir embarrada ni cerrada. Si el agua se queda haciendo bolsa alrededor, ahí empieza el problema.`,
        roots: `${prefix}Lo notarías en señales como crecimiento más torpe, hoja menos alegre o sensación de que no tiro fino. Cuando mi raíz sufre, arriba se acaba notando.`,
        water: `${prefix}No me sirve ni la sequedad extrema ni el suelo constantemente empapado. El punto bueno es humedad estable con salida del exceso.`,
        wind: `${prefix}Con viento fuerte puedo perder confort rápido, sobre todo si coincido con poco equilibrio hídrico. Por eso agradezco protección y barrera viva.`,
        pruning: `${prefix}En mi caso menos es más. Antes una poda selectiva que un destrozo con buena intención.`,
        fertilization: `${prefix}Si la base está mal, abonar no arregla nada. Primero suelo y raíz. Luego nutrición.`,
        fruit: `${prefix}Sí, puedo darte fruto, pero solo si me mantienes en equilibrio. Si me fuerzas cuando estoy tenso, no respondo igual.`,
        disease: `${prefix}La prevención conmigo es mucho más inteligente que llegar tarde. Suelo aireado y sin charco: ese es el principio.`,
        general: `${prefix}Lo importante conmigo es esto: no soy un árbol para llevar por inercia. Si el suelo está bien, yo respondo bastante bien.`
      };

      if (intent === 'followup') {
        const lastTopic = this.getLastTopic('aguacatero', speaker) || 'general';
        return followUpReplies[lastTopic] || followUpReplies.general;
      }

      this.setLastTopic('aguacatero', speaker, intent);
      return topicReplies[intent] || topicReplies.general;
    }

    nisperoReply(intent, speaker) {
      const prefix = this.speakerFlavorPrefix(speaker, 'Níspero');

      const prefix = this.speakerFlavorPrefix(speaker, 'Moral');

    estanqueReply(intent, speaker) {
      const prefix = this.speakerFlavorPrefix(speaker, 'Estanque');

      const replies = {
        status: `${prefix}Voy equilibrando humedad, temperatura y presencia de vida alrededor.`,
        water: `${prefix}Yo no soy solo agua acumulada; soy regulación, inercia térmica y apoyo a biodiversidad.`,
        needs: `${prefix}Mi prioridad es el equilibrio: no exceso de limpieza, no abandono total, y buena lectura del conjunto.`,
        general: `${prefix}Si me entiendes como nodo vivo y no como simple depósito, me entiendes mejor.`
      };

      if (intent === 'followup') {
        const lastTopic = this.getLastTopic('estanque', speaker) || 'general';
        return {
          water: `${prefix}Sí, me refiero a que influyo en más cosas que el nivel de agua: humedad ambiente, fauna y regulación térmica.`,
          general: `${prefix}En mí lo importante es equilibrio, no obsesión.`
        }[lastTopic] || `${prefix}Conmigo menos intervención impulsiva y más lectura del sistema.`;
      }

      this.setLastTopic('estanque', speaker, intent);
      return replies[intent] || replies.general;
    }

    generateResponse(message, beingKey, speaker) {
      const text = this.normalizeText(message);
      const intent = this.detectIntent(text);

      if (beingKey === 'aguacatero') return this.avocadoReply(intent, speaker);
      if (beingKey === 'nispero') return this.nisperoReply(intent, speaker);
      if (beingKey === 'tomatero') return this.tomateroReply(intent, speaker);
      if (beingKey === 'moral') return this.moralReply(intent, speaker);
      if (beingKey === 'estanque') return this.estanqueReply(intent, speaker);

      return 'Te escucho.';
    }

    addMessage(humanMessage) {
      const being = this.getCurrentBeing();
      const speaker = this.state.currentSpeaker;
      const thread = this.getCurrentThread();
      const timeStr = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

      thread.push({
        type: 'human',
        text: humanMessage,
        by: speaker,
        time: timeStr
      });

      const reply = this.generateResponse(humanMessage, this.state.currentContext, speaker);

      setTimeout(() => {
        thread.push({
          type: 'being',
          text: reply,
          by: being.name,
          time: timeStr
        });
        window.dispatchEvent(new Event('new-message'));
      }, 320);
    }

    async updateWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=28.139&longitude=-15.632&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto');
        const data = await res.json();
        const current = data.current;
        this.state.weather = {
          temp: Math.round(current.temperature_2m),
          humidity: Math.round(current.relative_humidity_2m)
        };
      } catch (e) {
        this.state.weather = { temp: 24, humidity: 65 };
      }
    }
  }

  const engine = new FincaEngine(fincaState);

  const DOM = {
    cards: document.getElementById('cards'),
    chatBody: document.getElementById('chatBody'),
    chatName: document.getElementById('chatName'),
    chatSubtitle: document.getElementById('chatSubtitle'),
    chatIcon: document.getElementById('chatIcon'),
    input: document.getElementById('messageInput'),
    sendBtn: document.getElementById('sendBtn'),
    weatherMain: document.getElementById('weatherMain'),
    weatherSub: document.getElementById('weatherSub'),
    monthLabel: document.getElementById('monthLabel'),
    selectedPhoto: document.getElementById('selectedPhoto'),
    selectedName: document.getElementById('selectedName'),
    selectedSubtitle: document.getElementById('selectedSubtitle'),
    selectedStatus: document.getElementById('selectedStatus'),
    selectedNeed: document.getElementById('selectedNeed'),
    selectedSummary: document.getElementById('selectedSummary'),
    selectedFunction: document.getElementById('selectedFunction'),
    selectedBadge: document.getElementById('selectedBadge'),
    speakerBtns: document.querySelectorAll('.speaker-btn')
  };

  function renderCards() {
    DOM.cards.innerHTML = Object.keys(engine.state.beings).map(key => {
      const b = engine.getBeing(key);
      const active = key === engine.state.currentContext ? 'active' : '';
      return `
        <div class="being-card ${active}" data-being="${key}">
          <div class="being-head">
            <div class="being-photo"><img src="${b.photo}" alt="${b.name}" /></div>
            <div>
              <div class="being-name">${b.name}</div>
              <div class="being-sub">${b.subtitle.split('·')[0]}</div>
            </div>
          </div>
          <div class="season-pill">${b.seasonIcon} ${b.season}</div>
          <div class="being-message">${b.cardText}</div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('[data-being]').forEach(el => {
      el.addEventListener('click', () => handleContextChange(el.dataset.being));
    });
  }

  function renderSelected() {
    const b = engine.getCurrentBeing();
    DOM.selectedPhoto.innerHTML = `<img src="${b.photo}" alt="${b.name}" />`;
    DOM.selectedName.textContent = b.name;
    DOM.selectedSubtitle.textContent = b.subtitle;
    DOM.selectedStatus.textContent = b.status;
    DOM.selectedNeed.textContent = b.bio.needs;
    DOM.selectedSummary.textContent = b.summary;
    DOM.selectedFunction.textContent = b.function;
    DOM.selectedBadge.textContent = b.timelineTag;
  }

  function renderChat() {
    const b = engine.getCurrentBeing();
    const thread = engine.getCurrentThread();

    DOM.chatName.textContent = b.name;
    DOM.chatSubtitle.textContent = `${b.subtitle} · canal ${engine.state.currentSpeaker}`;
    DOM.chatIcon.innerHTML = `<img src="${b.photo}" alt="${b.name}" />`;

    DOM.chatBody.innerHTML = thread.map(msg => `
      <div class="msg ${msg.type}">
        ${msg.type === 'being' ? `<strong>${msg.by}:</strong> ` : ''}${msg.text}
        ${msg.by && msg.type !== 'system' ? `<small>${msg.by} · ${msg.time}</small>` : ''}
      </div>
    `).join('');

    DOM.chatBody.scrollTop = DOM.chatBody.scrollHeight;
  }

  function renderWeather() {
    if (engine.state.weather.temp) {
      DOM.weatherMain.textContent = `${engine.state.weather.temp}°C · Analizando`;
      DOM.weatherSub.textContent = `Gran Canaria · ${engine.state.weather.humidity}% humedad · vientos alisios`;
    }
  }

  function handleContextChange(key) {
    engine.setCurrentContext(key);
    renderCards();
    renderSelected();
    renderChat();
  }

  function handleSendMessage() {
    const value = DOM.input.value.trim();
    if (!value) return;
    engine.addMessage(value);
    DOM.input.value = '';
    renderChat();
  }

  function initSpeakers() {
    DOM.speakerBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        DOM.speakerBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        engine.setSpeaker(btn.dataset.speaker);
        renderChat();
      });
    });
  }

  function initializeApp() {
    const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    DOM.monthLabel.textContent = months[new Date().getMonth()];

    engine.updateWeather().then(renderWeather);

    DOM.sendBtn.addEventListener('click', handleSendMessage);
    DOM.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSendMessage();
    });

    window.addEventListener('new-message', renderChat);

    initSpeakers();
    renderCards();
    handleContextChange(engine.state.currentContext);
  }

  initializeApp();
</script>
