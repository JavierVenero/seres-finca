<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finca Viva · Seres del Universo Sintrópico</title>
  <style>
    :root {
      --color-bg-deep: #0C0D0E;
      --color-surface-base: #151618;
      --color-surface-raised: #202123;
      --color-bio-green: #39FF14;
      --color-bio-emerald: #10B981;
      --color-water-blue: #00E5FF;
      --color-text-main: #FFFFFF;
      --color-text-sub: #A0A0A0;
      --border-ui: 1px solid #333333;
      --r-xl: 16px;
      --r-lg: 12px;
      --r-md: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--color-text-main);
      background-color: var(--color-bg-deep);
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100vh; max-width: 1400px; margin: 0 auto; }

    /* CABECERA */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background-color: var(--color-surface-base);
      border-bottom: var(--border-ui); flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 32px; height: 32px; border-radius: var(--r-md);
      display: grid; place-items: center; font-size: 18px;
      background: linear-gradient(135deg, var(--color-bio-emerald), var(--color-bio-green));
      color: #000; box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }
    .brand-title { font-size: 20px; font-weight: 800; color: var(--color-text-main); letter-spacing: -0.02em; }
    .brand-subtitle { font-size: 12px; color: var(--color-text-sub); }
    .pill-top {
      padding: 4px 10px; border-radius: 999px; background: rgba(57, 255, 20, 0.1);
      border: 1px solid rgba(57, 255, 20, 0.3); color: var(--color-bio-green);
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .weather-compact { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--color-text-sub); }
    .weather-compact .temp { font-weight: bold; color: var(--color-text-main); }

    /* LAYOUT */
    .main-content { display: flex; flex: 1; overflow: hidden; }

    /* COLUMNA IZQUIERDA */
    .left-col {
      width: 350px; background-color: var(--color-surface-raised);
      border-right: var(--border-ui); display: flex; flex-direction: column; overflow-y: hidden;
    }
    .section-head-compact {
      padding: 15px 20px 10px; font-size: 11px; font-weight: 700;
      color: var(--color-text-sub); text-transform: uppercase; letter-spacing: 1px;
      border-bottom: var(--border-ui); flex-shrink: 0;
    }
    .beings-list {
      display: flex; flex-direction: column; gap: 5px; padding: 10px 15px;
      overflow-y: auto; flex: 1;
    }
    /* Estilo barra scroll */
    .beings-list::-webkit-scrollbar { width: 6px; }
    .beings-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

    .being-card-sm {
      background-color: var(--color-surface-base); border: 1px solid transparent;
      border-radius: var(--r-md); padding: 8px 12px; display: flex; align-items: center;
      gap: 12px; cursor: pointer; transition: all 0.2s ease;
    }
    .being-card-sm:hover { background-color: #2A2B2D; }
    .being-card-sm.active {
      border-color: var(--color-bio-emerald); background-color: rgba(16, 185, 129, 0.05);
      box-shadow: inset 2px 0 0 var(--color-bio-green);
    }
    .being-photo-sm {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0; border: 1px solid #444; background: #222; display:grid; place-items:center; font-size: 18px;
    }
    .being-info-sm h4 { font-size: 14px; font-weight: 600; color: var(--color-text-main); margin-bottom: 2px;}
    .being-info-sm span { font-size: 11px; color: var(--color-text-sub); }

    .detail-panel { padding: 20px; background-color: var(--color-bg-deep); border-top: var(--border-ui); flex-shrink: 0; }
    .selected-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .selected-photo {
      width: 60px; height: 60px; border-radius: var(--r-lg); border: 2px solid var(--color-surface-raised);
      background: #222; display:grid; place-items:center; font-size: 30px;
    }
    .selected-name { font-size: 20px; font-weight: 800; color: var(--color-bio-green); }
    .selected-sub { font-size: 12px; color: var(--color-text-sub); }
    .mini-panel { background-color: var(--color-surface-base); border: var(--border-ui); border-radius: var(--r-md); padding: 10px; margin-bottom: 10px; }
    .mini-panel strong { display: block; font-size: 10px; text-transform: uppercase; color: var(--color-bio-emerald); margin-bottom: 4px; }
    .mini-panel span { font-size: 12px; line-height: 1.4; color: var(--color-text-main); }

    /* CHAT */
    .chat-area { flex: 1; display: flex; flex-direction: column; background-color: var(--color-bg-deep); position: relative; }
    .chat-area::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(16, 185, 129, 0.03) 0%, transparent 70%); pointer-events: none; }
    
    .chat-header {
      padding: 15px 25px; border-bottom: var(--border-ui); background-color: rgba(21, 22, 24, 0.8);
      backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }
    .chat-title-group { display: flex; align-items: center; gap: 12px; }
    .chat-icon-lg { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #444; background: #222; display:grid; place-items:center; font-size: 20px;}
    .chat-name-lg { font-size: 16px; font-weight: 700; color: var(--color-text-main); }
    .sync-status { font-size: 11px; color: var(--color-water-blue); display: flex; align-items: center; gap: 4px;}
    .sync-status::before { content: "●"; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    .voice-selector { display: flex; align-items: center; background: var(--color-surface-raised); border-radius: 999px; padding: 3px; border: var(--border-ui); }
    .voice-label { font-size: 10px; text-transform: uppercase; color: var(--color-text-sub); padding: 0 10px; font-weight: 600;}
    .speaker-btn { background: transparent; color: var(--color-text-sub); border: none; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .speaker-btn.active { background: var(--color-surface-base); color: var(--color-bio-green); box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: 1px solid #333; }

    .chat-viewport { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 5; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: var(--r-md); font-size: 14px; line-height: 1.5; position: relative; }
    .msg small { display: block; margin-top: 5px; font-size: 10px; opacity: 0.6; text-align: right; }
    .msg.system { align-self: center; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); color: var(--color-water-blue); font-size: 12px; text-align: center; max-width: 90%; border-radius: 999px; padding: 6px 16px; }
    .msg.being { align-self: flex-start; background-color: var(--color-surface-raised); border: var(--border-ui); border-bottom-left-radius: 0; color: var(--color-text-main); }
    .msg.being strong { color: var(--color-bio-emerald); }
    .msg.human { align-self: flex-end; background: linear-gradient(135deg, #1A3A2B, #0F4C3A); border: 1px solid var(--color-bio-emerald); border-bottom-right-radius: 0; color: var(--color-text-main); }

    .input-area { padding: 15px 25px; background-color: var(--color-surface-base); border-top: var(--border-ui); display: flex; gap: 10px; z-index: 10; }
    input[type="text"] { flex: 1; background-color: var(--color-surface-raised); border: 1px solid #444; color: var(--color-text-main); padding: 14px 20px; border-radius: 999px; font-size: 14px; outline: none; }
    input[type="text"]:focus { border-color: var(--color-bio-green); }
    .send-btn { background-color: var(--color-bio-green); color: #000; border: none; padding: 0 25px; border-radius: 999px; font-size: 14px; font-weight: 800; cursor: pointer; }

    @media (max-width: 900px) {
      .main-content { flex-direction: column; }
      .left-col { width: 100%; height: 40vh; border-right: none; border-bottom: var(--border-ui); }
      .detail-panel { display: none; }
      .chat-area { height: 60vh; }
      .chat-header { flex-direction: column; align-items: flex-start; gap: 10px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🌿</div>
        <div>
          <h1 class="brand-title">Finca Viva</h1>
          <div class="brand-subtitle">Gemelo Digital Sintrópico</div>
        </div>
      </div>
      <div class="weather-compact">
        <span class="icon">⛅</span>
        <span class="temp" id="weatherMain">--°C</span>
        <span id="weatherSub">Analizando entorno...</span>
      </div>
      <div class="pill-top">Sistema Alta Densidad</div>
    </header>

    <main class="main-content">
      <aside class="left-col">
        <div class="section-head-compact">Red Biológica (45 seres vivos)</div>
        <div class="beings-list" id="cards"></div>
        <div class="detail-panel">
          <div class="selected-top">
            <div class="selected-photo" id="selectedPhoto"></div>
            <div>
              <div class="selected-name" id="selectedName">--</div>
              <div class="selected-sub" id="selectedSubtitle">--</div>
            </div>
          </div>
          <div class="mini-panel"><strong>Estado Actual</strong><span id="selectedStatus">--</span></div>
          <div class="mini-panel"><strong>Necesidad Radicular</strong><span id="selectedNeed">--</span></div>
          <div class="mini-panel"><strong>Función Sintrópica</strong><span id="selectedFunction">--</span></div>
        </div>
      </aside>

      <section class="chat-area">
        <div class="chat-header">
          <div class="chat-title-group">
            <div class="chat-icon-lg" id="chatIcon"></div>
            <div>
              <div class="chat-name-lg" id="chatName">Conectando...</div>
              <div class="sync-status">Sincronizado con entorno</div>
            </div>
          </div>
          <div class="voice-selector">
            <span class="voice-label">Habla como</span>
            <button class="speaker-btn active" data-speaker="Mario">Mario</button>
            <button class="speaker-btn" data-speaker="Yani">Yani</button>
            <button class="speaker-btn" data-speaker="Invitad@">Invitad@</button>
          </div>
        </div>
        <div class="chat-viewport" id="chatBody"></div>
        <div class="input-area">
          <input id="messageInput" type="text" autocomplete="off" placeholder="Inicia conexión verbal..." />
          <button class="send-btn" id="sendBtn">Enviar</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Base de datos de los 45 seres con asignación de categorías para IA
    const rawBeingsData = [
      { id: 'aguacatero', name: 'Aguacatero', sub: 'Persea americana', cat: 'arbol_frutal', icon: '🥑' },
      { id: 'nispero', name: 'Níspero', sub: 'Eriobotrya japonica', cat: 'arbol_frutal', icon: '🍑' },
      { id: 'naranjero', name: 'Naranjero', sub: 'Citrus × sinensis', cat: 'citrico', icon: '🍊' },
      { id: 'limonero', name: 'Limonero', sub: 'Citrus limon', cat: 'citrico', icon: '🍋' },
      { id: 'platanera', name: 'Platanera', sub: 'Musa × paradisiaca', cat: 'subtropical', icon: '🍌' },
      { id: 'guayabo', name: 'Guayabo', sub: 'Psidium guajava', cat: 'subtropical', icon: '🍈' },
      { id: 'lavanda', name: 'Lavanda', sub: 'Lavandula', cat: 'aromatica', icon: '🪻' },
      { id: 'poleo', name: 'Poleo', sub: 'Mentha pulegium', cat: 'aromatica', icon: '🌿' },
      { id: 'salvia', name: 'Salvia', sub: 'Salvia officinalis', cat: 'aromatica', icon: '🌱' },
      { id: 'almendro', name: 'Almendro', sub: 'Prunus dulcis', cat: 'arbol_frutal', icon: '🌸' },
      { id: 'melocotonero', name: 'Melocotonero', sub: 'Prunus persica', cat: 'arbol_frutal', icon: '🍑' },
      { id: 'manzanero', name: 'Manzanero', sub: 'Malus domestica', cat: 'arbol_frutal', icon: '🍎' },
      { id: 'fisalis', name: 'Fisalis', sub: 'Physalis peruviana', cat: 'hortaliza_fruto', icon: '🍒' },
      { id: 'tomatero', name: 'Tomatero', sub: 'Solanum lycopersicum', cat: 'hortaliza_fruto', icon: '🍅' },
      { id: 'mango', name: 'Mango', sub: 'Mangifera indica', cat: 'subtropical', icon: '🥭' },
      { id: 'higuera', name: 'Higuera', sub: 'Ficus carica', cat: 'arbol_frutal', icon: '🌿' },
      { id: 'calabacin', name: 'Calabacín', sub: 'Cucurbita pepo', cat: 'hortaliza_fruto', icon: '🥒' },
      { id: 'berenjena', name: 'Berenjena', sub: 'Solanum melongena', cat: 'hortaliza_fruto', icon: '🍆' },
      { id: 'remolacha', name: 'Remolacha', sub: 'Beta vulgaris', cat: 'raiz', icon: '🧅' },
      { id: 'patatas', name: 'Patatas', sub: 'Solanum tuberosum', cat: 'raiz', icon: '🥔' },
      { id: 'pimientos', name: 'Pimientos', sub: 'Capsicum annuum', cat: 'hortaliza_fruto', icon: '🫑' },
      { id: 'lechugas', name: 'Lechugas', sub: 'Lactuca sativa', cat: 'hortaliza_hoja', icon: '🥬' },
      { id: 'peral', name: 'Peral', sub: 'Pyrus communis', cat: 'arbol_frutal', icon: '🍐' },
      { id: 'tomillo', name: 'Tomillo', sub: 'Thymus vulgaris', cat: 'aromatica', icon: '🌿' },
      { id: 'oregano', name: 'Orégano', sub: 'Origanum vulgare', cat: 'aromatica', icon: '🍃' },
      { id: 'perejil', name: 'Perejil', sub: 'Petroselinum crispum', cat: 'aromatica', icon: '🌿' },
      { id: 'cilantro', name: 'Cilantro', sub: 'Coriandrum sativum', cat: 'aromatica', icon: '🌱' },
      { id: 'fresas', name: 'Fresas', sub: 'Fragaria', cat: 'hortaliza_fruto', icon: '🍓' },
      { id: 'mandarino', name: 'Mandarino', sub: 'Citrus reticulata', cat: 'citrico', icon: '🍊' },
      { id: 'acelgas', name: 'Acelgas', sub: 'Beta vulgaris var. cicla', cat: 'hortaliza_hoja', icon: '🥬' },
      { id: 'apio', name: 'Apio', sub: 'Apium graveolens', cat: 'hortaliza_hoja', icon: '🌿' },
      { id: 'cebollas', name: 'Cebollas', sub: 'Allium cepa', cat: 'raiz', icon: '🧅' },
      { id: 'puerro', name: 'Puerro', sub: 'Allium ampeloprasum', cat: 'raiz', icon: '🧄' },
      { id: 'cafetero', name: 'Cafetero', sub: 'Coffea arabica', cat: 'subtropical', icon: '☕' },
      { id: 'batata', name: 'Batata', sub: 'Ipomoea batatas', cat: 'raiz', icon: '🍠' },
      { id: 'artemisa', name: 'Artemisa', sub: 'Artemisia vulgaris', cat: 'aromatica', icon: '🌿' },
      { id: 'manzanilla', name: 'Manzanilla', sub: 'Chamaemelum nobile', cat: 'aromatica', icon: '🌼' },
      { id: 'cana', name: 'Caña', sub: 'Arundo donax', cat: 'barrera', icon: '🎋' },
      { id: 'olivo', name: 'Olivo', sub: 'Olea europaea', cat: 'arbol_frutal', icon: '🫒' },
      { id: 'judias', name: 'Judías', sub: 'Phaseolus vulgaris', cat: 'hortaliza_fruto', icon: '🫘' },
      { id: 'papayo', name: 'Papayo', sub: 'Carica papaya', cat: 'subtropical', icon: '🍈' },
      { id: 'maracuya', name: 'Maracuyá', sub: 'Passiflora edulis', cat: 'trepadora', icon: '🌸' },
      { id: 'beroles', name: 'Beroles', sub: 'Aeonium', cat: 'suculenta', icon: '🪴' },
      { id: 'tunos', name: 'Tunos', sub: 'Opuntia ficus-indica', cat: 'suculenta', icon: '🌵' },
      { id: 'lirios', name: 'Lirios acuáticos', sub: 'Nymphaeaceae', cat: 'acuatico', icon: '🪷' }
    ];

    // Generador dinámico de estado
    const generatedBeings = {};
    rawBeingsData.forEach(b => {
      generatedBeings[b.id] = {
        name: b.name, subtitle: b.sub, category: b.cat, icon: b.icon,
        status: 'Lectura de biometría en proceso...',
        summary: `Especie clave en el estrato ${b.cat.replace('_', ' ')}.`,
        function: 'Aporte de diversidad y equilibrio al ecosistema sintrópico.',
        bio: { needs: 'Análisis de suelo y clima en curso.' }
      };
    });

    const fincaState = {
      currentContext: 'aguacatero',
      currentSpeaker: 'Mario',
      weather: { temp: null, humidity: null },
      beings: generatedBeings
    };

    class FincaEngine {
      constructor(state) {
        this.state = state;
        this.threads = this.buildInitialThreads();
      }

      // El cerebro algorítmico: Genera diálogos iniciales basados en la categoría
      buildInitialThreads() {
        const threads = {};
        Object.keys(this.state.beings).forEach(key => {
          const b = this.state.beings[key];
          let defaultGreeting = '';
          
          switch(b.category) {
            case 'arbol_frutal': defaultGreeting = 'Estabilizando mi crecimiento. Enraizando profundo para sostener la estructura.'; break;
            case 'citrico': defaultGreeting = 'Sintetizando luz. Necesito buen drenaje y vigilancia en mis hojas nuevas.'; break;
            case 'subtropical': defaultGreeting = 'Buscando calor y humedad ambiental. La protección del viento me da la vida.'; break;
            case 'hortaliza_fruto': defaultGreeting = 'Consumiendo mucha energía para cuajar fruto rápido. El suelo vivo es mi motor.'; break;
            case 'hortaliza_hoja': defaultGreeting = 'Manteniendo frescor para no espigarme antes de tiempo.'; break;
            case 'raiz': defaultGreeting = 'Trabajando bajo tierra. Si el suelo está suelto y aireado, engordo bien.'; break;
            case 'aromatica': defaultGreeting = 'Concentrando aceites esenciales al sol. Poca agua, mucha luz.'; break;
            case 'suculenta': defaultGreeting = 'Administrando mis propias reservas de agua. No me ahogues.'; break;
            case 'acuatico': defaultGreeting = 'Filtrando el sistema. Aportando oxigenación y cobijo.'; break;
            default: defaultGreeting = 'Sincronizando con la biósfera de la finca.';
          }

          threads[key] = {
            Mario: [
              { type: 'system', text: `Conexión establecida con ${b.name}` },
              { type: 'being', text: `Mario, aquí estoy. ${defaultGreeting}`, by: b.name, time: '10:00' }
            ],
            Yani: [
              { type: 'system', text: `Canal Yani / ${b.name}` },
              { type: 'being', text: `Yani, percibo el equilibrio general. ${defaultGreeting}`, by: b.name, time: 'Ayer' }
            ],
            'Invitad@': [
              { type: 'system', text: `Conexión de Invitad@ a la Finca Viva` },
              { type: 'being', text: `Si estás de paso, respeta el ritmo. ${defaultGreeting}`, by: b.name, time: 'Hoy' }
            ]
          };
        });
        return threads;
      }

      getBeing(key) { return this.state.beings[key]; }
      getCurrentBeing() { return this.getBeing(this.state.currentContext); }
      getCurrentThread() { return this.threads[this.state.currentContext][this.state.currentSpeaker]; }
      setCurrentContext(key) { if (this.state.beings[key]) this.state.currentContext = key; }
      setSpeaker(name) { this.state.currentSpeaker = name; }

      normalizeText(text) { return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }
      hasAny(text, words) { return words.some(word => text.includes(word)); }

      detectIntent(text) {
        if (this.hasAny(text, ["riego", "agua", "sed"])) return "water";
        if (this.hasAny(text, ["drenaje", "charco"])) return "drainage";
        if (this.hasAny(text, ["poda", "cortar"])) return "pruning";
        if (this.hasAny(text, ["abono", "nutrientes"])) return "fertilization";
        return "general";
      }

      generateResponse(message, beingKey, speaker) {
        const text = this.normalizeText(message);
        const intent = this.detectIntent(text);
        const being = this.getBeing(beingKey);
        
        // Respuestas inteligentes basadas en la categoría botánica
        let reply = "";
        if (intent === 'water') {
            if(being.category === 'suculenta' || being.category === 'aromatica') reply = "Cuidado con el riego. Yo sobrevivo mejor con la tierra más seca que ahogada.";
            else if(being.category === 'hortaliza_fruto' || being.category === 'hortaliza_hoja') reply = "Sí, necesito humedad constante en la raíz para no parar el ritmo.";
            else reply = "Riega profundo pero espaciado, necesito que el suelo respire entre riegos.";
        } else if (intent === 'pruning') {
            if(being.category === 'arbol_frutal') reply = "Solo poda de formación o para abrir luz al centro. No me castigues.";
            else if(being.category === 'hortaliza_fruto') reply = "Quítame los chupones bajos para que ventile bien.";
            else reply = "Déjame expandir mi biomasa por ahora.";
        } else {
            reply = "Te escucho. Lo importante es leer el entorno: sol, viento y suelo vivo.";
        }
        
        return speaker === 'Mario' ? reply : (speaker === 'Yani' ? "Desde el equilibrio: " + reply : "Atiende: " + reply);
      }

      addMessage(humanMessage) {
        const being = this.getCurrentBeing();
        const speaker = this.state.currentSpeaker;
        const thread = this.getCurrentThread();
        const timeStr = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        thread.push({ type: 'human', text: humanMessage, by: speaker, time: timeStr });
        const reply = this.generateResponse(humanMessage, this.state.currentContext, speaker);

        setTimeout(() => {
          thread.push({ type: 'being', text: reply, by: being.name, time: timeStr });
          window.dispatchEvent(new Event('new-message'));
        }, 400);
      }

      async updateWeather() {
        try {
          const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=28.13&longitude=-15.63&current=temperature_2m,relative_humidity_2m&timezone=auto');
          const data = await res.json();
          this.state.weather = { temp: Math.round(data.current.temperature_2m), humidity: Math.round(data.current.relative_humidity_2m) };
        } catch (e) { this.state.weather = { temp: 22, humidity: 60 }; }
      }
    }

    const engine = new FincaEngine(fincaState);

    const DOM = {
      cards: document.getElementById('cards'),
      chatBody: document.getElementById('chatBody'),
      chatName: document.getElementById('chatName'),
      chatIcon: document.getElementById('chatIcon'),
      input: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      weatherMain: document.getElementById('weatherMain'),
      selectedPhoto: document.getElementById('selectedPhoto'),
      selectedName: document.getElementById('selectedName'),
      selectedSubtitle: document.getElementById('selectedSubtitle'),
      selectedStatus: document.getElementById('selectedStatus'),
      selectedNeed: document.getElementById('selectedNeed'),
      selectedFunction: document.getElementById('selectedFunction'),
      speakerBtns: document.querySelectorAll('.speaker-btn')
    };

    function renderCards() {
      DOM.cards.innerHTML = Object.keys(engine.state.beings).map(key => {
        const b = engine.getBeing(key);
        const active = key === engine.state.currentContext ? 'active' : '';
        return `
          <div class="being-card-sm ${active}" data-being="${key}">
            <div class="being-photo-sm">${b.icon}</div>
            <div class="being-info-sm">
              <h4>${b.name}</h4>
              <span>${b.subtitle}</span>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('[data-being]').forEach(el => {
        el.addEventListener('click', () => handleContextChange(el.dataset.being));
      });
    }

    function renderSelected() {
      const b = engine.getCurrentBeing();
      DOM.selectedPhoto.innerHTML = b.icon;
      DOM.selectedName.textContent = b.name;
      DOM.selectedSubtitle.textContent = b.subtitle;
      DOM.selectedStatus.textContent = b.status;
      DOM.selectedNeed.textContent = b.bio.needs;
      DOM.selectedFunction.textContent = b.function;
    }

    function renderChat() {
      const b = engine.getCurrentBeing();
      const thread = engine.getCurrentThread();

      DOM.chatName.textContent = b.name;
      DOM.chatIcon.innerHTML = b.icon;

      DOM.chatBody.innerHTML = thread.map(msg => `
        <div class="msg ${msg.type}">
          ${msg.type === 'being' ? `<strong>${msg.by}:</strong> ` : ''}${msg.text}
          ${msg.by && msg.type !== 'system' ? `<small>${msg.time}</small>` : ''}
        </div>
      `).join('');
      DOM.chatBody.scrollTop = DOM.chatBody.scrollHeight;
    }

    function renderWeather() {
      if (engine.state.weather.temp) {
        DOM.weatherMain.textContent = `${engine.state.weather.temp}°C`;
      }
    }

    function handleContextChange(key) {
      engine.setCurrentContext(key);
      renderCards(); renderSelected(); renderChat();
    }

    function handleSendMessage() {
      const value = DOM.input.value.trim();
      if (!value) return;
      engine.addMessage(value);
      DOM.input.value = '';
      renderChat();
    }

    function initSpeakers() {
      DOM.speakerBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          DOM.speakerBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          engine.setSpeaker(btn.dataset.speaker);
          renderChat();
        });
      });
    }

    function initializeApp() {
      engine.updateWeather().then(renderWeather);
      DOM.sendBtn.addEventListener('click', handleSendMessage);
      DOM.input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSendMessage(); });
      window.addEventListener('new-message', renderChat);
      initSpeakers(); renderCards(); handleContextChange(engine.state.currentContext);
    }

    initializeApp();
  </script>
</body>
</html>
