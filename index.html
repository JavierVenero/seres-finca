<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finca Viva · Seres del Universo Sintrópico</title>
  <style>
    :root {
      --bg: #f4f9f7;
      --bg2: #ffffff;
      --paper: rgba(255, 255, 255, 0.96);
      --paper-strong: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --green: #10b981;
      --green-2: #059669;
      --blue: #3b82f6;
      --blue-2: #2563eb;
      --cyan: #06b6d4;
      --line: #e2e8f0;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      max-width: 1300px;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper-strong);
      padding: 10px 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #a7f3d0, #34d399);
      font-size: 18px;
    }

    .brand-title {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 22px;
      line-height: 1;
      color: var(--ink);
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .header-stats {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .h-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 6px 12px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .h-stat span.val { color: var(--ink); font-weight: 800; }

    .beings-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    
    .beings-strip::-webkit-scrollbar { height: 4px; }
    .beings-strip::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .mini-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--paper-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      min-width: 180px;
      transition: all 0.2s;
    }

    .mini-card:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .mini-card.active {
      background: #f0fdf4;
      border-color: var(--green);
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.1);
    }

    .mini-card img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
    }

    .mini-card-info {
      display: flex;
      flex-direction: column;
    }

    .mini-name { font-size: 13px; font-weight: 800; }
    .mini-status { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .workspace {
      display: flex;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: var(--paper-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .workspace-left { flex: 1.2; }
    .workspace-right { flex: 0.8; max-width: 400px; }

    .panel-header {
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .tab-row {
      display: flex;
      gap: 16px;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 0 0 10px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .panel-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .selected-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .selected-photo img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .selected-name { font-size: 24px; font-weight: 800; line-height: 1.1; }
    .selected-sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    
    .selected-status {
      padding: 14px;
      border-radius: 12px;
      background: #eff6ff;
      border-left: 4px solid var(--blue);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .mini-panel {
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .mini-panel strong {
      display: block;
      font-size: 11px;
      color: var(--blue-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      font-weight: 800;
    }

    .mini-panel span { font-size: 13px; line-height: 1.4; }

    .map-wrap {
      position: relative;
      width: 100%;
      height: 380px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: url('cartografia-finca.jpg') center/cover;
      background-color: var(--green);
      overflow: hidden;
    }

    .zone-label {
      position: absolute;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 800;
    }
    .z-casa { right: 15%; top: 12%; }
    .z-huerto { right: 13%; top: 34%; }
    .z-estanque { left: 46%; bottom: 16%; }
    .z-biomasa { left: 12%; bottom: 24%; }

    .node {
      position: absolute;
      padding: 6px 10px;
      border-radius: 10px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.95);
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .node.active { background: var(--blue); color: white; border-color: var(--blue); }
    .node .n-title { font-size: 11px; font-weight: 800; }
    
    .nisp { right: 24%; top: 24%; }
    .agua { right: 26%; top: 52%; }
    .moral { left: 24%; top: 60%; }
    .toma { right: 14%; top: 66%; }
    .estanque { left: 44%; bottom: 10%; }
    .mario { left: 12%; top: 22%; }
    .yani { left: 30%; top: 34%; }

    .timeline-list { display: grid; gap: 10px; }
    .event { padding: 12px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--line); }
    .event-head { display: flex; justify-content: space-between; font-weight: 800; font-size: 13px; }
    .event p { margin: 6px 0 0; font-size: 12px; color: var(--muted); }

    .chat-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      flex-shrink: 0;
    }
    
    .chat-top img { width: 32px; height: 32px; border-radius: 8px; }
    .chat-top-info { flex: 1; }
    .chat-top-name { font-size: 14px; font-weight: 800; }
    .chat-status-dot { color: var(--green); font-size: 11px; font-weight: 800; }

    .chat-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
      background: var(--paper-strong);
    }

    .msg {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
      width: fit-content;
    }
    .msg.system { background: #dcfce7; color: var(--green-2); margin: 0 auto; font-size: 11px; font-weight: 600; text-align: center; }
    .msg.being { background: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.human { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg small { display: block; margin-top: 4px; opacity: 0.7; font-size: 10px; }

    .chat-controls {
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #f8fafc;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .speaker-select {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .speaker-select span { font-size: 11px; font-weight: 700; color: var(--muted); }
    .spk-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .spk-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    .chat-input {
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 13px;
      outline: none;
    }
    .chat-input input:focus { border-color: var(--blue); }
    .chat-input button {
      padding: 0 16px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .top-header { flex-wrap: wrap; gap: 10px; justify-content: center; }
      .workspace { flex-direction: column; }
      .workspace-right { max-width: 100%; min-height: 500px; }
    }
  </style>
</head>
<body>
  <div class="app">
    
    <!-- 1. Cabecera Dashboard -->
    <header class="top-header">
      <div class="brand">
        <div class="logo">🌿</div>
        <div>
          <h1 class="brand-title">Finca Viva</h1>
          <div class="brand-subtitle">Seres del Universo Sintrópico</div>
        </div>
      </div>
      <div class="header-stats">
        <div class="h-stat">⛅ <span class="val" id="weatherMain">24°C</span></div>
        <div class="h-stat">🌿 <span class="val">7 Seres</span></div>
        <div class="h-stat">💬 <span class="val">App viva</span></div>
        <div class="h-stat">📅 <span class="val" id="monthLabel">Marzo</span></div>
      </div>
    </header>

    <!-- 2. Navegación Visual Horizontal -->
    <nav class="beings-strip" id="cardsStrip"></nav>

    <!-- 3. Espacio de trabajo (Cero scroll de página) -->
    <main class="workspace">
      
      <!-- Izquierda: Ficha, Mapa, Pulso -->
      <section class="panel workspace-left">
        <div class="panel-header">
          <div class="tab-row">
            <button class="tab-btn active" data-target="ficha">Ficha Viva</button>
            <button class="tab-btn" data-target="mapa">Mapa Espacial</button>
            <button class="tab-btn" data-target="pulso">Pulso Global</button>
          </div>
        </div>
        
        <div class="panel-body">
          <!-- Pantalla: Ficha -->
          <div class="screen active" id="view-ficha">
            <div class="selected-top">
              <div class="selected-photo" id="selPhoto"></div>
              <div>
                <div class="selected-name" id="selName">Aguacatero</div>
                <div class="selected-sub" id="selSub"></div>
              </div>
            </div>
            <div class="selected-status" id="selStatus"></div>
            <div class="info-grid">
              <div class="mini-panel">
                <strong>Necesidad actual</strong>
                <span id="selNeed"></span>
              </div>
              <div class="mini-panel">
                <strong>Resumen del día</strong>
                <span id="selSumm"></span>
              </div>
            </div>
            <div class="mini-panel">
              <strong>Función en el sistema</strong>
              <span id="selFunc"></span>
            </div>
          </div>

          <!-- Pantalla: Mapa -->
          <div class="screen" id="view-mapa">
            <div class="map-wrap">
              <div class="zone-label z-casa">Casa y núcleo</div>
              <div class="zone-label z-huerto">Huerto cercanía</div>
              <div class="zone-label z-estanque">Agua viva</div>
              <div class="zone-label z-biomasa">Masa vegetal</div>

              <div class="node mario" data-node="mario"><div class="n-title">Mario</div></div>
              <div class="node yani" data-node="yani"><div class="n-title">Yani</div></div>
              <div class="node nisp" data-node="nispero"><div class="n-title">Níspero</div></div>
              <div class="node agua" data-node="aguacatero"><div class="n-title">Aguacatero</div></div>
              <div class="node moral" data-node="moral"><div class="n-title">Moral</div></div>
              <div class="node toma" data-node="tomatero"><div class="n-title">Tomatero</div></div>
              <div class="node estanque" data-node="estanque"><div class="n-title">Estanque</div></div>
            </div>
          </div>

          <!-- Pantalla: Pulso -->
          <div class="screen" id="view-pulso">
            <div class="timeline-list" id="timelineList"></div>
          </div>
        </div>
      </section>

      <!-- Derecha: Chat -->
      <section class="panel workspace-right">
        <div class="chat-top">
          <div id="chatIcon"></div>
          <div class="chat-top-info">
            <div class="chat-top-name" id="chatName">Aguacatero</div>
            <div class="chat-status-dot">• Sincronizado</div>
          </div>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="chat-controls">
          <div class="speaker-select">
            <span>Voz activa:</span>
            <button class="spk-btn active" data-spk="Mario">Mario</button>
            <button class="spk-btn" data-spk="Yani">Yani</button>
            <button class="spk-btn" data-spk="Invitad@">Invitad@</button>
          </div>
          <div class="chat-input">
            <input id="chatIn" type="text" autocomplete="off" placeholder="Habla al sistema..." />
            <button id="chatBtn">Enviar</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    const fincaState = {
      currentContext: 'aguacatero',
      currentSpeaker: 'Mario',
      weather: { temp: null, humidity: null },

      beings: {
        aguacatero: {
          photo: 'https://images.unsplash.com/photo-1601039641847-7857b994d704?auto=format&fit=crop&w=500&q=80',
          name: 'Aguacatero', subtitle: 'Persea americana', seasonIcon: '💧',
          status: 'Manteniendo follaje nuevo, raíz alerta por humedad.',
          summary: 'Sensible al viento fuerte y asfixia radicular.',
          function: 'Estructura de estrato medio-alto y producción.',
          timelineText: 'Vigilar humedad en zona baja del suelo.',
          bio: { needs: 'Drenaje excelente' },
          messages: [{ type: 'system', text: 'Conexión radicular activa.' }]
        },
        nispero: {
          photo: 'https://images.unsplash.com/photo-1601039641847-7857b994d704?auto=format&fit=crop&w=500&q=80',
          name: 'Níspero', subtitle: 'Eriobotrya japonica', seasonIcon: '🌼',
          status: 'Cargando reservas para engorde de fruto.',
          summary: 'Rústico. Agradece potasio.',
          function: 'Frutal temprano, alimento y estabilidad.',
          timelineText: 'Requiere ceniza o consuelda para potasio.',
          bio: { needs: 'Abono potásico' },
          messages: [{ type: 'system', text: 'Fase de engorde de fruto.' }]
        },
        moral: {
          photo: 'https://images.unsplash.com/photo-1628773822503-930a7eaecf80?auto=format&fit=crop&w=500&q=80',
          name: 'Moral', subtitle: 'Morus nigra', seasonIcon: '🌿',
          status: 'Empujando savia nueva sin parar.',
          summary: 'Generador masivo de biomasa.',
          function: 'Sombra y materia orgánica para el suelo.',
          timelineText: 'Podar para acolchar otras zonas.',
          bio: { needs: 'Podas de formación' },
          messages: [{ type: 'system', text: 'Bombeo de savia alto.' }]
        },
        tomatero: {
          photo: 'https://images.unsplash.com/photo-1592841200221-a6898f307baa?auto=format&fit=crop&w=500&q=80',
          name: 'Tomatero', subtitle: 'Solanum lycopersicum', seasonIcon: '🍅',
          status: 'Gastando energía en trepar y cuajar.',
          summary: 'Exigente en calcio y luz.',
          function: 'Rendimiento rápido e indicador del huerto.',
          timelineText: 'Riesgo fúngico si toca suelo.',
          bio: { needs: 'Entutorado y riego' },
          messages: [{ type: 'system', text: 'Crecimiento vegetativo acelerado.' }]
        },
        estanque: {
          photo: 'https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=500&q=80',
          name: 'Estanque', subtitle: 'Biotopo', seasonIcon: '💦',
          status: 'Plantas oxigenando correctamente.',
          summary: 'Regula temperatura y humedad.',
          function: 'Reserva hídrica del sistema.',
          timelineText: 'Raíces filtrando nitratos.',
          bio: { needs: 'Equilibrio luz/sombra' },
          messages: [{ type: 'system', text: 'Nivel hídrico estable.' }]
        },
        mario: {
          photo: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=500&q=80',
          name: 'Mario', subtitle: 'Cuidador', seasonIcon: '🛠️',
          status: 'Ajustando riegos.',
          summary: 'Ejecutor físico.',
          function: 'Traduce diseño en acción.',
          timelineText: 'Repasar canales de agua.',
          bio: { needs: 'Lectura atenta' },
          messages: [{ type: 'system', text: 'Nodo humano operativo.' }]
        },
        yani: {
          photo: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=500&q=80',
          name: 'Yani', subtitle: 'Cuidadora', seasonIcon: '👁️',
          status: 'Observando interacciones.',
          summary: 'Visión global.',
          function: 'Lectura holística.',
          timelineText: 'Evaluando viento.',
          bio: { needs: 'Paseo perimetral' },
          messages: [{ type: 'system', text: 'Nodo humano operativo.' }]
        }
      },
      order: ['aguacatero', 'nispero', 'tomatero', 'moral', 'estanque', 'mario', 'yani']
    };

    class Engine {
      constructor(state) { this.state = state; }
      getB(k) { return this.state.beings[k]; }
      curr() { return this.getB(this.state.currentContext); }
      
      genReply(msg, key) {
        const text = msg.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        const b = this.getB(key);
        
        if (text.includes('como estas') || text.includes('estado')) return `Sigo mi curso. ${b.status}`;
        if (text.includes('lluvi') || text.includes('viento')) return 'Si viene temporal, asegura mi estructura básica y revisa el drenaje en mi zona.';
        if (text.includes('agua') || text.includes('rieg') || text.includes('suelo')) return 'El equilibrio en la raíz lo es todo. Comprueba el nivel de humedad.';
        if (text.includes('poda') || text.includes('cortar')) return 'Intervenir está bien si respetas mi ciclo de savia.';
        if (text.includes('refier') || text.includes('por que')) return `Me refiero a que mi equilibrio depende de mi biología. Ahora mismo requiero: ${b.bio.needs}.`;
        if (text.includes('necesit') || text.includes('ayud')) return `Mi necesidad central ahora es: ${b.bio.needs}.`;
        
        return 'Sigo asimilando el entorno. Continuamos el ciclo.';
      }

      addMsg(txt) {
        const b = this.curr();
        const time = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        b.messages.push({ type: 'human', text: txt, by: this.state.currentSpeaker, time });
        
        setTimeout(() => {
          b.messages.push({ type: 'being', text: this.genReply(txt, this.state.currentContext), by: b.name, time });
          renderChat();
        }, 500);
      }
    }

    const eng = new Engine(fincaState);

    const D = {
      strip: document.getElementById('cardsStrip'),
      tabBtns: document.querySelectorAll('.tab-btn'),
      screens: document.querySelectorAll('.screen'),
      selPhoto: document.getElementById('selPhoto'),
      selName: document.getElementById('selName'),
      selSub: document.getElementById('selSub'),
      selStatus: document.getElementById('selStatus'),
      selNeed: document.getElementById('selNeed'),
      selSumm: document.getElementById('selSumm'),
      selFunc: document.getElementById('selFunc'),
      chatIcon: document.getElementById('chatIcon'),
      chatName: document.getElementById('chatName'),
      chatBody: document.getElementById('chatBody'),
      chatIn: document.getElementById('chatIn'),
      chatBtn: document.getElementById('chatBtn'),
      spkBtns: document.querySelectorAll('.spk-btn'),
      nodes: document.querySelectorAll('.node'),
      timeList: document.getElementById('timelineList'),
      monthLabel: document.getElementById('monthLabel')
    };

    function renderStrip() {
      D.strip.innerHTML = fincaState.order.map(k => {
        const b = eng.getB(k);
        const act = k === fincaState.currentContext ? 'active' : '';
        return `
          <div class="mini-card ${act}" data-key="${k}">
            <img src="${b.photo}">
            <div class="mini-card-info">
              <span class="mini-name">${b.name}</span>
              <span class="mini-status">${b.seasonIcon} Activo</span>
            </div>
          </div>
        `;
      }).join('');
      document.querySelectorAll('.mini-card').forEach(c => c.onclick = () => setContext(c.dataset.key));
    }

    function renderView() {
      const b = eng.curr();
      D.selPhoto.innerHTML = `<img src="${b.photo}">`;
      D.selName.textContent = b.name;
      D.selSub.textContent = b.subtitle;
      D.selStatus.textContent = b.status;
      D.selNeed.textContent = b.bio.needs;
      D.selSumm.textContent = b.summary;
      D.selFunc.textContent = b.function;
      D.nodes.forEach(n => n.classList.toggle('active', n.dataset.node === fincaState.currentContext));
    }

    function renderChat() {
      const b = eng.curr();
      D.chatName.textContent = b.name;
      D.chatIcon.innerHTML = `<img src="${b.photo}">`;
      D.chatBody.innerHTML = b.messages.map(m => `
        <div class="msg ${m.type}">
          ${m.type==='being'?`<strong>${m.by}:</strong> `:''}${m.text}
          ${m.by&&m.type!=='system'?`<small>${m.by} · ${m.time}</small>`:''}
        </div>
      `).join('');
      D.chatBody.scrollTop = D.chatBody.scrollHeight;
    }

    function renderTimeline() {
      D.timeList.innerHTML = fincaState.order.map(k => {
        const b = eng.getB(k);
        return `<div class="event"><div class="event-head">${b.seasonIcon} ${b.name}</div><p>${b.timelineText}</p></div>`;
      }).join('');
    }

    function setContext(k) {
      fincaState.currentContext = k;
      renderStrip();
      renderView();
      renderChat();
    }

    function init() {
      D.monthLabel.textContent = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][new Date().getMonth()];
      
      D.tabBtns.forEach(b => b.onclick = () => {
        D.tabBtns.forEach(x => x.classList.remove('active'));
        D.screens.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById(`view-${b.dataset.target}`).classList.add('active');
      });

      D.spkBtns.forEach(b => b.onclick = () => {
        D.spkBtns.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        fincaState.currentSpeaker = b.dataset.spk;
      });

      const send = () => { if(D.chatIn.value.trim()){ eng.addMsg(D.chatIn.value); D.chatIn.value=''; }};
      D.chatBtn.onclick = send;
      D.chatIn.onkeydown = e => e.key === 'Enter' && send();

      renderStrip();
      renderView();
      renderChat();
      renderTimeline();

      fetch('https://api.open-meteo.com/v1/forecast?latitude=28.139&longitude=-15.632&current=temperature_2m')
        .then(r=>r.json()).then(d=> document.getElementById('weatherMain').textContent = Math.round(d.current.temperature_2m)+'°C')
        .catch(()=>{});
    }

    init();
  </script>
</body>
</html>
