<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finca Viva · Universo Sintrópico</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-overlay"></div>
  <div class="app">
    
    <header class="topbar">
      <div class="brand">
        <div class="brand-titles">
          <h1 class="brand-title">Finca Viva</h1>
          <div class="brand-subtitle">Universo sintrópico de seres</div>
          <div class="brand-location">Caserío de Vergara, Nº 33, El Ojito - Desaguaderos. Santa María de Guía.</div>
        </div>
      </div>
      <div class="header-actions">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar ser..." onkeyup="filterBeings(this.value)" />
        <div class="weather-widget" id="weatherWidget">
          <div class="weather-compact">
            <span class="icon">⛅</span>
            <div class="weather-info">
              <span class="temp">--°C</span>
              <span class="altitude-tag">445 msnm · Medianía Baja</span>
            </div>
          </div>
        </div>
        <button class="btn-add-main" style="background-color: #3182CE; border-color: #2B6CB0; margin-right: 10px;" onclick="analyzeEcosystem()">Analizar Ecosistema</button>
        <button class="btn-add-main" onclick="openAddModal()">Integrar Ser</button>
      </div>
    </header>

    <main class="main-content">
      <div class="nursery-container">
        <div class="nursery-header">
          <div class="nursery-title">
            <span>🌱 Bandeja de Seres por Ubicar</span>
            <span class="nursery-count" id="unassignedCount">0</span>
          </div>
        </div>
        <div class="drop-grid drop-zone" id="unassignedGrid" data-zone-id="vivero"></div>
      </div>
      <div class="zones-grid" id="zonesGridContainer"></div>
    </main>
  </div>

  <div class="modal-overlay" id="analysisModal">
    <div class="modal-content" style="max-width: 600px; width: 90%;">
      <div class="modal-header">Inteligencia Ecológica de la Finca</div>
      <div id="analysisResults" style="max-height: 65vh; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px; text-align: left; font-size: 0.95rem;"></div>
      <div class="modal-actions" style="margin-top: 20px;">
        <button class="btn-cancel" onclick="closeAnalysisModal()">Cerrar Informe</button>
      </div>
    </div>
  </div>

  <div class="big-modal-overlay" id="inspectModal">
    <div class="big-modal-content">
      <button class="close-modal-btn" onclick="closeInspectModal()">✕</button>
      <div class="bm-photo" id="inspectPhoto">--</div>
      <div class="bm-name" id="inspectName">--</div>
      <div class="bm-sub" id="inspectSub">--</div>
      <div class="bm-location-badge" id="inspectLocationBadge">--</div>
      <div class="bm-grid">
        <div class="bm-panel"><strong>Estrato</strong><span id="inspectEstrato">--</span></div>
        <div class="bm-panel"><strong>Fase</strong><span id="inspectRole">--</span></div>
      </div>
      <button class="bm-delete" onclick="deleteCurrentBeing()">Retirar del ecosistema</button>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal-content">
      <div class="modal-header">Integrar nuevo ser</div>
      <div class="form-group">
        <input type="text" id="catalogSearch" class="search-input" style="width: 100%" placeholder="🔍 Buscar especie en el catálogo..." onkeyup="filterCatalog(this.value)">
      </div>
      <div id="catalogResults" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 15px; padding-right: 5px;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
